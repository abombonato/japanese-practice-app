<!DOCTYPE html>
<html>
<head>
  <title>My Japanese Practice App hihihi</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f7c6d9;
    }

    h1 { color: #2f6f62; }

    /* 🌸 Background decorations */
    .decor {
      position: fixed;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .top-left {
      top: 10px;
      left: 10px;
      font-size: 28px;
      transform: rotate(-10deg);
    }

    .bottom-right {
      bottom: 10px;
      right: 10px;
      font-size: 90px;
    }

    /* 🧱 App layout */
    .card {
      position: relative;
      z-index: 2;
      background: white;
      padding: 20px;
      margin: 15px auto;
      border-radius: 12px;
      max-width: 500px;
    }

    button {
      padding: 10px 15px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      background: #2f6f62;
      color: white;
      cursor: pointer;
    }

    input {
      padding: 8px;
      width: 80%;
      margin-top: 8px;
    }

    .hidden { display: none; }

    #score {
      font-weight: bold;
      margin-bottom: 10px;
    }

    #difficultyLabel {
      margin-top: 10px;
      font-weight: bold;
    }

    /* 📩 Contact button */
    #contactBtn {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: transparent;
      border: none;
      font-size: 14px;
      cursor: pointer;
      z-index: 3;
    }

    /* 📱 Contact screen */
    #contactScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 999;

      display: none; /* FIXED */

      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .contactContent {
      font-family: Arial;
    }

    /* 🐭 Pikachu image */
    .pikachu-img {
      width: 220px;
      height: auto;
      animation: shake 0.5s infinite alternate;
    }

    @keyframes shake {
      from { transform: rotate(-8deg); }
      to { transform: rotate(8deg); }
    }
  </style>
</head>

<body>

<!-- 🌸 Background -->
<div class="decor top-left">🌸 🌸 🌸 🌸 🌸</div>
<div class="decor bottom-right">🗻</div>

<h1>My Japanese Practice App hihihi 🇯🇵</h1>

<div id="score">Score: 0/0 (0%)</div>

<!-- HOME -->
<div id="home">

  <div class="card">
    <h3>Difficulty</h3>

    <button onclick="setDifficulty('easy')">Easy (0–20)</button>
    <button onclick="setDifficulty('medium')">Medium (0–100)</button>
    <button onclick="setDifficulty('hard')">Hard (0–999)</button>

    <p id="difficultyLabel">Current: Easy</p>
  </div>

  <button onclick="startExercise(1)">Numbers → Romaji</button>
  <button onclick="startExercise(2)">Numbers → Hiragana</button>
  <button onclick="startExercise(3)">Hiragana → Romaji</button>
  <button onclick="startExercise(4)">🎤 Speak Numbers</button>

</div>

<!-- EXERCISE -->
<div id="exercise" class="hidden">
  <div class="card">

    <h2 id="question"></h2>

    <button onclick="playAudio()">🔊 Hear Pronunciation</button>

    <div id="inputArea"></div>

    <p id="feedback"></p>

    <button onclick="generate()">Next</button>
    <button onclick="goHome()">Back</button>

  </div>
</div>

<!-- CONTACT BUTTON -->
<div id="contactBtn" onclick="openContact()">
  entre em contato
</div>

<!-- CONTACT SCREEN -->
<div id="contactScreen">
  <div class="contactContent">

    <!-- 🐭 IMAGE ONLY -->
    <img src="pikachu.png" class="pikachu-img" />

    <p>volte quando quiser estudar 🇯🇵</p>

    <button onclick="closeContact()">Voltar</button>

  </div>
</div>

<script>

let currentMode = 1;
let currentNumber = 0;

let correctRomaji = "";
let correctHiragana = "";

let total = Number(localStorage.getItem("total")) || 0;
let correct = Number(localStorage.getItem("correct")) || 0;

let difficulty = "easy";

/* ---------- CONTACT ---------- */

function openContact() {
  document.getElementById("contactScreen").style.display = "flex";
}

function closeContact() {
  document.getElementById("contactScreen").style.display = "none";
}

/* ---------- DIFFICULTY ---------- */

function setDifficulty(level) {
  difficulty = level;

  document.getElementById("difficultyLabel").innerText =
    "Current: " + level.charAt(0).toUpperCase() + level.slice(1);
}

/* ---------- SCORE ---------- */

function updateScore(isCorrect) {
  total++;
  if (isCorrect) correct++;

  localStorage.setItem("total", total);
  localStorage.setItem("correct", correct);

  renderScore();
}

function renderScore() {
  let percent = total === 0 ? 0 : Math.round((correct / total) * 100);

  document.getElementById("score").innerText =
    `Score: ${correct}/${total} (${percent}%)`;
}

renderScore();

/* ---------- NUMBER SYSTEM ---------- */

function convertNumber(num) {
  const ones = ["", "ichi", "ni", "san", "yon", "go", "roku", "nana", "hachi", "kyuu"];
  const tens = ["", "juu", "ni juu", "san juu", "yon juu", "go juu", "roku juu", "nana juu", "hachi juu", "kyuu juu"];
  const hundreds = ["", "hyaku", "ni hyaku", "sanbyaku", "yon hyaku", "go hyaku", "roppyaku", "nana hyaku", "happyaku", "kyuu hyaku"];
  const thousands = ["", "sen", "ni sen", "sanzen", "yon sen", "go sen", "roku sen", "nana sen", "hassen", "kyuu sen"];

  let t = Math.floor(num / 1000);
  let h = Math.floor((num % 1000) / 100);
  let te = Math.floor((num % 100) / 10);
  let o = num % 10;

  return `${thousands[t]} ${hundreds[h]} ${tens[te]} ${ones[o]}`.trim();
}

function romajiToHiragana(text) {
  const map = {
    ichi:"いち", ni:"に", san:"さん", yon:"よん", go:"ご",
    roku:"ろく", nana:"なな", hachi:"はち", kyuu:"きゅう",
    juu:"じゅう", hyaku:"ひゃく", sen:"せん",
    sanbyaku:"さんびゃく", roppyaku:"ろっぴゃく",
    happyaku:"はっぴゃく", sanzen:"さんぜん", hassen:"はっせん"
  };

  return text.split(" ").map(w => map[w] || "").join("");
}

/* ---------- FLOW ---------- */

function startExercise(mode) {
  currentMode = mode;
  document.getElementById("home").classList.add("hidden");
  document.getElementById("exercise").classList.remove("hidden");
  generate();
}

function goHome() {
  document.getElementById("exercise").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

/* ---------- GENERATE ---------- */

function generateNumber() {
  if (difficulty === "easy") return Math.floor(Math.random() * 21);
  if (difficulty === "medium") return Math.floor(Math.random() * 101);
  return Math.floor(Math.random() * 1000);
}

function generate() {

  currentNumber = generateNumber();

  correctRomaji = convertNumber(currentNumber);
  correctHiragana = romajiToHiragana(correctRomaji);

  const q = document.getElementById("question");
  const input = document.getElementById("inputArea");

  document.getElementById("feedback").innerText = "";

  if (currentMode === 1) {
    q.innerText = `Write in romaji: ${currentNumber}`;
    input.innerHTML = `<input id="answer"/><button onclick="checkText()">Check</button>`;
  }

  if (currentMode === 2) {
    q.innerText = `Select hiragana: ${currentNumber}`;

    let options = [correctHiragana];

    while (options.length < 3) {
      let fake = romajiToHiragana(convertNumber(generateNumber()));
      if (!options.includes(fake)) options.push(fake);
    }

    options.sort(() => Math.random() - 0.5);

    input.innerHTML = options.map(opt =>
      `<button onclick="checkMCQ('${opt}')">${opt}</button>`
    ).join("");
  }

  if (currentMode === 3) {
    q.innerText = `Write in romaji: ${correctHiragana}`;
    input.innerHTML = `<input id="answer"/><button onclick="checkText()">Check</button>`;
  }

  if (currentMode === 4) {
    q.innerText = `Say in Japanese: ${currentNumber}`;
    input.innerHTML = `<button onclick="startSpeech()">🎤 Speak</button>`;
  }
}

/* ---------- CHECK ---------- */

function checkText() {
  let user = document.getElementById("answer").value.trim();
  let isCorrect = user === correctRomaji;

  updateScore(isCorrect);

  document.getElementById("feedback").innerText =
    isCorrect ? "✅ Correct!" : `❌ ${correctRomaji}`;
}

function checkMCQ(choice) {
  let isCorrect = choice === correctHiragana;

  updateScore(isCorrect);

  document.getElementById("feedback").innerText =
    isCorrect ? "✅ Correct!" : `❌ ${correctHiragana}`;
}

/* ---------- SPEECH ---------- */

function startSpeech() {
  const recognition = new webkitSpeechRecognition();
  recognition.lang = "ja-JP";

  recognition.start();

  recognition.onresult = function(event) {
    let spoken = event.results[0][0].transcript;

    let isCorrect =
      spoken.replace(/\s/g, "") === correctRomaji.replace(/\s/g, "");

    updateScore(isCorrect);

    document.getElementById("feedback").innerText =
      isCorrect
        ? `✅ Good! (${spoken})`
        : `❌ Heard: ${spoken} | ${correctRomaji}`;
  };
}

/* ---------- AUDIO ---------- */

function playAudio() {
  let utterance = new SpeechSynthesisUtterance(correctHiragana);
  utterance.lang = "ja-JP";
  speechSynthesis.speak(utterance);
}

</script>

</body>
</html>
