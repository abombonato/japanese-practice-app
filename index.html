<!DOCTYPE html>
<html>
<head>
  <title>My Japanese Practice App hihihi</title>

  <style>
    .pikachu-img {
  width: 200px;
  height: auto;
  animation: shake 0.5s infinite alternate;
}
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f7c6d9;
    }

    h1 { color: #2f6f62; }

    /* 🌸 Decorations */
    .decor {
      position: fixed;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .top-left {
      top: 10px;
      left: 10px;
      font-size: 28px;
      transform: rotate(-10deg);
    }

    .bottom-right {
      bottom: 10px;
      right: 10px;
      font-size: 90px;
    }

    /* 🧱 App layout */
    .card {
      position: relative;
      z-index: 2;
      background: white;
      padding: 20px;
      margin: 15px auto;
      border-radius: 12px;
      max-width: 500px;
    }

    button {
      padding: 10px 15px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      background: #2f6f62;
      color: white;
      cursor: pointer;
    }

    input {
      padding: 8px;
      width: 80%;
      margin-top: 8px;
    }

    .hidden { display: none; }

    #score {
      font-weight: bold;
      margin-bottom: 10px;
    }

    #difficultyLabel {
      margin-top: 10px;
      font-weight: bold;
    }

    /* 📩 Contact button */
    #contactBtn {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: transparent;
      border: none;
      font-size: 14px;
      cursor: pointer;
      z-index: 3;
    }

    /* 😂 Contact screen */
    #contactScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 999;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .contactContent {
      font-family: Arial;
    }

    .emoji {
      font-size: 60px;
      animation: shake 0.5s infinite alternate;
    }

    @keyframes shake {
      from { transform: rotate(-10deg); }
      to { transform: rotate(10deg); }
    }
  </style>
</head>

<body>

<!-- 🌸 Background -->
<div class="decor top-left">🌸 🌸 🌸 🌸 🌸</div>
<div class="decor bottom-right">🗻</div>

<h1>My Japanese Practice App hihihi 🇯🇵</h1>

<div id="score">Score: 0/0 (0%)</div>

<!-- HOME -->
<div id="home">

  <div class="card">
    <h3>Difficulty</h3>

    <button onclick="setDifficulty('easy')">Easy (0–20)</button>
    <button onclick="setDifficulty('medium')">Medium (0–100)</button>
    <button onclick="setDifficulty('hard')">Hard (0–999)</button>

    <p id="difficultyLabel">Current: Easy</p>
  </div>

  <button onclick="startExercise(1)">Numbers → Romaji</button>
  <button onclick="startExercise(2)">Numbers → Hiragana</button>
  <button onclick="startExercise(3)">Hiragana → Romaji</button>
  <button onclick="startExercise(4)">🎤 Speak Numbers</button>

</div>

<!-- EXERCISE -->
<div id="exercise" class="hidden">
  <div class="card">

    <h2 id="question"></h2>

    <button onclick="playAudio()">🔊 Hear Pronunciation</button>

    <div id="inputArea"></div>

    <p id="feedback"></p>

    <button onclick="generate()">Next</button>
    <button onclick="goHome()">Back</button>

  </div>
</div>

<!-- CONTACT BUTTON -->
<div id="contactBtn" onclick="openContact()">
  entre em contato
</div>

<!-- CONTACT SCREEN -->
<div id="contactScreen" class="hidden">
  <div class="contactContent">
    <img src="pikachu.png" class="pikachu-img" />
    <p>volte quando quiser estudar 🇯🇵</p>

    <button onclick="closeContact()">Voltar</button>
  </div>
</div>

<script>

let currentMode = 1;
let currentNumber = 0;

let correctRomaji = "";
let correctHiragana = "";

let total = Number(localStorage.getItem("total")) || 0;
let correct = Number(localStorage.getItem("correct")) || 0;

let difficulty = "easy";

/* ---------- CONTACT ---------- */

function openContact() {
  document.getElementById("contactScreen").classList.remove("hidden");
}

function closeContact() {
  document.getElementById("contactScreen").classList.add("hidden");
}
